            <button class="btn btn-secondary" style="font-size:12px; padding:6px 12px; background:#475569;" id="bgmBtn" onclick="toggleBGM()">
                <i class="fa-solid fa-music"></i> 音樂: 關閉
            </button>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let bgmIntervalId = null;
        let isBgmPlaying = false;
        let noteStep = 0;

        const melody = [329.63, 329.63, 0, 329.63, 0, 261.63, 329.63, 0, 392.00, 0, 0, 0, 196.00, 0, 0, 0];
        const bassLine = [130.81, 130.81, 196.00, 130.81, 146.83, 146.83, 220.00, 146.83, 164.81, 164.81, 246.94, 164.81, 130.81, 196.00, 130.81, 0];

        function play8BitNode(freq, type, duration, vol) {
            if (freq === 0) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e){}
        }

        function toggleBGM() {
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }
            const btn = document.getElementById('bgmBtn');
            
            if (!isBgmPlaying) {
                isBgmPlaying = true;
                btn.innerHTML = `<i class="fa-solid fa-pause"></i> 音樂: 播放中`;
                btn.style.background = "#0d9488";
                
                noteStep = 0;
                bgmIntervalId = setInterval(() => {
                    const currentMelody = melody[noteStep % melody.length];
                    const currentBass = bassLine[noteStep % bassLine.length];
                    
                    if(currentMelody > 0) play8BitNode(currentMelody, 'square', 0.15, 0.02);
                    if(currentBass > 0) play8BitNode(currentBass, 'triangle', 0.25, 0.04);
                    
                    noteStep++;
                }, 180);
            } else {
                isBgmPlaying = false;
                if (bgmIntervalId) { clearInterval(bgmIntervalId); bgmIntervalId = null; }
                btn.innerHTML = `<i class="fa-solid fa-music"></i> 音樂: 關閉`;
                btn.style.background = "#475569";
            }
        }

        function playSoundEffect(type) {
            try {
                if (audioCtx.state === 'suspended') { audioCtx.resume(); }
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                if (type === 'click') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(587.33, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.08);
                } else if (type === 'victory') {
                    [523.25, 659.25, 783.99, 1046.50].forEach((f, idx) => {
                        setTimeout(() => play8BitNode(f, 'square', 0.2, 0.05), idx * 80);
                    });
                } else if (type === 'hit') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(180, audioCtx.currentTime);
                    osc.frequency.linearRampToValueAtTime(60, audioCtx.currentTime + 0.25);
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.25);
                } else if (type === 'gacha') {
                    let timeOffset = 0;
                    for(let i=0; i<6; i++) {
                        setTimeout(() => play8BitNode(600 + (i*100), 'sine', 0.06, 0.04), timeOffset);
                        timeOffset += 70;
                    }
                }
            } catch(e) {}
        }
    </script>

        function initDatabase() {
            dbRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    systemDatabase = data;
                } else {
                    systemDatabase = JSON.parse(JSON.stringify(DEFAULT_DATABASE));
                    rebuildStudentListByConfig();
                    saveDatabase();
                }

                // 資料安全性相容補丁
                if (!systemDatabase.teamPools) { systemDatabase.teamPools = { 'A': 0, 'B': 0, 'C': 0, 'D': 0, 'E': 0 }; }
                systemDatabase.students.forEach(st => {
                    if (!st.petList) st.petList = st.pet ? [st.pet] : [];
                    if (!st.achievements) st.achievements = { firstEvolve: false, bossHunter: false, topBreeder: false };
                    st.petList.forEach(p => { if (!p.personality) p.personality = 'none'; });
                    if (st.pet && !st.pet.personality) st.pet.personality = 'none';

                renderMainStudentGrid();
                renderDynamicRankList();
                renderTerritories();
                renderTeamPoolsOnDashboard();
                if(currentActiveTabletSeat) { renderTabletView(); }
            });

        function rebuildStudentListByConfig() {
            const existingMap = {};
            if(systemDatabase.students) { systemDatabase.students.forEach(s => { existingMap[s.id] = s; }); }
            const newStudents = [];
            for(let i=1; i<=30; i++) {
                let foundTeam = 'A';
                Object.keys(systemDatabase.teamConfig).forEach(tk => {
                    const arr = systemDatabase.teamConfig[tk].split(',').map(n => parseInt(n.trim()));
                    if(arr.includes(i)) { foundTeam = tk; }
                });
                const oldInfo = existingMap[i];
                newStudents.push({
                    id: i, name: `學生${i < 10 ? '0' + i : i}`, team: foundTeam, teamName: TEAM_NAMES[foundTeam],
                    foodCount: oldInfo ? oldInfo.foodCount : 5, tokens: oldInfo ? oldInfo.tokens : 2,
                    hasActed: oldInfo ? oldInfo.hasActed : false, damageContribution: oldInfo ? oldInfo.damageContribution : 0,
                    pet: oldInfo ? oldInfo.pet : null,
                    petList: oldInfo ? (oldInfo.petList || (oldInfo.pet ? [oldInfo.pet] : [])) : [],
                    achievements: oldInfo ? (oldInfo.achievements || { firstEvolve: false, bossHunter: false, topBreeder: false }) : { firstEvolve: false, bossHunter: false, topBreeder: false }
                });
            }
            systemDatabase.students = newStudents;
        }

            renderMainStudentGrid();
            selectTabletSeat(id);
        }

        function quickSelectGroup(mode) {
            playSoundEffect('click');
            if (mode === 'all') { selectedStudentIds = systemDatabase.students.map(st => st.id); } 
            else if (mode === 'none') { selectedStudentIds = []; } 
            else { selectedStudentIds = systemDatabase.students.filter(st => st.team === mode).map(st => st.id); }
            renderMainStudentGrid();
        }

        function settleBlackboardScore() {
            const inputEl = document.getElementById('blackboardScore');
            const score = parseInt(inputEl.value);
            if (isNaN(score) || score <= 0) { alert("請輸入分數！"); return; }
            if (selectedStudentIds.length === 0) { alert("請先選擇同學卡片！"); return; }
            const award = Math.floor(score / 50);
            if (award > 0) {
                systemDatabase.students.forEach(st => {
                    if (selectedStudentIds.includes(st.id)) { st.foodCount += award; }
                });
                playSoundEffect('victory');
                confetti({ particleCount: 40 });
            }
            inputEl.value = score % 50;
            saveDatabase();
        }

        function giveBatchReward(type, amount) {
            if (selectedStudentIds.length === 0) { alert("請先選定卡片！"); return; }
            systemDatabase.students.forEach(st => {
                if (selectedStudentIds.includes(st.id)) {
                    if (type === 'food') st.foodCount += amount;
                    if (type === 'token') st.tokens += amount;
                }
            });
            playSoundEffect('victory');
            saveDatabase();
        }

        function clearBatchActionStatus() {
            if (selectedStudentIds.length === 0) { alert("請選定對象！"); return; }
            systemDatabase.students.forEach(st => { if (selectedStudentIds.includes(st.id)) { st.hasActed = false; } });
            saveDatabase();
        }

            playSoundEffect('click');

            document.getElementById(`btn-rank-${tab}`).classList.add('active');
            renderDynamicRankList();

        function renderDynamicRankList() {
            const list = document.getElementById('dynamicRankList');
            if(!list) return;
            list.innerHTML = '';
            if (currentRankTab === 'level') {
                const sorted = [...systemDatabase.students].sort((a,b)=> (b.pet?b.pet.level:0) - (a.pet?a.pet.level:0)).slice(0,5);
                sorted.forEach((st, i) => { list.innerHTML += `<div class="rank-item"><span>👑 ${i+1}. ${st.id}號</span><span style="color:var(--primary); font-weight:bold;">${st.pet ? st.pet.emoji+' '+st.pet.name+' Lv.'+st.pet.level : '未孵化'}</span></div>`; });
            } else if (currentRankTab === 'team') {
                const scores = { 'A': 0, 'B': 0, 'C': 0, 'D': 0, 'E': 0 };
                systemDatabase.students.forEach(st => { scores[st.team] += st.foodCount + (st.pet ? st.pet.level * 10 : 0); });
                Object.keys(scores).sort((a,b)=>scores[b]-scores[a]).forEach((tk, i) => {
                    list.innerHTML += `<div class="rank-item"><span>🛡️ ${i+1}. ${TEAM_NAMES[tk]}</span><span style="color:var(--success); font-weight:bold;">${Math.round(scores[tk])} 戰力</span></div>`;
                });
            } else if (currentRankTab === 'dmg') {
                const sorted = [...systemDatabase.students].sort((a,b)=> b.damageContribution - a.damageContribution).slice(0,5);
                sorted.forEach((st, i) => { list.innerHTML += `<div class="rank-item"><span>💥 ${i+1}. ${st.id}號</span><span style="color:var(--danger); font-weight:bold;">${st.damageContribution} 傷害</span></div>`; });
            }
        }

        function autoCalculateTerritories() {
            if(!systemDatabase.territories) return;
            systemDatabase.territories.forEach(t => {
                const scoreMap = { 'A': 0, 'B': 0, 'C': 0, 'D': 0, 'E': 0 };
                systemDatabase.students.forEach(st => { 
                    if (st.pet && st.pet.type === t.attr) { 
                        let weight = st.pet.personality === 'guardian' ? st.pet.level * 2 : st.pet.level;
                        scoreMap[st.team] += weight; 
                    } 
                });
                let max = 0;
                Object.keys(scoreMap).forEach(k => { if(scoreMap[k] > max) max = scoreMap[k]; });
                if (max === 0) { t.occupant = '暫無'; } 
                else {
                    let winners = [];
                    Object.keys(scoreMap).forEach(k => { if(scoreMap[k] === max) winners.push(TEAM_NAMES[k]); });
                    t.occupant = winners.join('&');
                }
            });
        }

            const student = systemDatabase.students.find(s => s.id === sid);

            const inputVal = document.getElementById(`rename-input-${sid}`).value.trim();

            playSoundEffect('click');
            saveDatabase();

        function changePetPersonality(sid, val) {
            const student = systemDatabase.students.find(s => s.id === sid);
            if (!student || !student.pet) return;
            
            student.pet.personality = val;
            const idx = student.petList.findIndex(p => p.petId === student.pet.petId);
            if (idx > -1) { student.petList[idx].personality = val; }

            playSoundEffect('click');
            autoCalculateTerritories();
            saveDatabase();
        }

        function donateToTeamPool(sid) {
            const student = systemDatabase.students.find(s => s.id === sid);
            if (student.foodCount < 1) { alert("❌ 您手邊沒有多餘的個人晶石可以分享喔！"); return; }
            
            student.foodCount -= 1;
            systemDatabase.teamPools[student.team] = (systemDatabase.teamPools[student.team] || 0) + 1;
            
            playSoundEffect('click');
            saveDatabase();
        }

        function withdrawFromTeamPool(sid) {
            const student = systemDatabase.students.find(s => s.id === sid);
            const currentPool = systemDatabase.teamPools[student.team] || 0;
            if (currentPool < 1) { alert("❌ 目前小組能量水槽空空如也！"); return; }
            
            systemDatabase.teamPools[student.team] -= 1;
            student.foodCount += 1;
            
            playSoundEffect('victory');
            saveDatabase();
        }

        function spinTabletGacha(sid) {
            const student = systemDatabase.students.find(s => s.id === sid);
            if (student.tokens < 1) { alert("❌ 您的扭蛋代幣不足喔！"); return; }
            
            student.tokens -= 1;
            playSoundEffect('gacha');

            const pool = ['fire_1', 'water_1', 'grass_1', 'light_1'];
            const randomKey = pool[Math.floor(Math.random() * pool.length)];
            const tmpl = PET_DICTIONARY[randomKey];

            const newPet = { petId: tmpl.id, name: tmpl.name, type: tmpl.type, emoji: tmpl.emoji, level: 1, exp: 0, personality: 'none' };
            
            if(!student.petList) student.petList = [];
            student.petList.push(newPet);
            if (!student.pet) { student.pet = newPet; }

            setTimeout(() => {
                playSoundEffect('victory');
                confetti({ particleCount: 30, spread: 50 });
                alert(`🎰 扭蛋成功！\n獲得：【${tmpl.type}系】${tmpl.emoji} ${tmpl.name}！已同步至雲端。`);
                autoCalculateTerritories();
                saveDatabase();
            }, 500);
        }

        function switchActivePet(sid, listIndex) {
            const student = systemDatabase.students.find(s => s.id === sid);
            if (!student || !student.petList || !student.petList[listIndex]) return;
            
            student.pet = student.petList[listIndex];
            playSoundEffect('click');
            
            autoCalculateTerritories();
            saveDatabase();
        }

        function feedStudentPet(sid) {
            const student = systemDatabase.students.find(s => s.id === sid);
            if (student.foodCount < 1) { alert("您的晶石不夠囉！"); return; }
            student.foodCount -= 1;
            
            const rand = Math.random();
            let baseExpGain = 25;
            let isCrit = false;

            if (student.pet.personality === 'smart') { baseExpGain += 5; } 

            if (rand < 0.05) {
                baseExpGain = 75; isCrit = true;
            } else if (rand < 0.15) {
                baseExpGain = 50; isCrit = true;
            }

            student.pet.exp += baseExpGain;
            playSoundEffect('click');

            if (isCrit) {
                setTimeout(() => {
                    confetti({ particleCount: 15, colors: ['#eab308', '#a855f7'] });
                    alert(`✨ 獲得【大滿足】！經驗值超絕 +${baseExpGain}！`);
                }, 50);
            }

            if (student.pet.exp >= 100) {
                student.pet.level += 1;
                student.pet.exp = student.pet.exp % 100;
                playSoundEffect('victory');
                confetti({ particleCount: 20 });
            }

            if (student.pet.level >= 15) { student.achievements.topBreeder = true; }
            
            const idx = student.petList.findIndex(p => p.petId === student.pet.petId);
            if (idx > -1) {
                student.petList[idx].level = student.pet.level;
                student.petList[idx].exp = student.pet.exp;
            }

            autoCalculateTerritories();
            saveDatabase();
        }

        function evolveStudentPet(sid, nextId) {
            const student = systemDatabase.students.find(s => s.id === sid);
            if (student.foodCount < 10) { alert("進化需要 10 個星能晶石！"); return; }
            const tmpl = PET_DICTIONARY[nextId];
            student.foodCount -= 10;
            
            const oldPetId = student.pet.petId;
            student.pet.petId = tmpl.id;
            student.pet.name = tmpl.name;
            student.pet.emoji = tmpl.emoji;
            student.pet.type = tmpl.type;
            student.pet.level = 1; 
            student.pet.exp = 0;
            
            student.achievements.firstEvolve = true;

            const idx = student.petList.findIndex(p => p.petId === oldPetId);
            if (idx > -1) {
                student.petList[idx] = {
                    petId: tmpl.id, name: tmpl.name, emoji: tmpl.emoji, type: tmpl.type, level: student.pet.level, exp: student.pet.exp, personality: student.pet.personality
                };
            }

            playSoundEffect('victory');
            confetti({ particleCount: 60 });
            autoCalculateTerritories();
            saveDatabase();
        }

        function studentAttackBossAction(sid) {
            const student = systemDatabase.students.find(s => s.id === sid);
            const boss = systemDatabase.boss;
            if (!boss.active) { alert("魔王已被擊倒！請等待下一次召喚。"); return; }
            if (student.hasActed) { alert("今日已攻擊過，正在冷卻中！"); return; }

            let dmg = student.pet.level * 25 + 30;
            let text = `基礎撞擊！`;

            if (student.pet.personality === 'hotblooded') {
                dmg = Math.floor(dmg * 1.2);
                text = `💥 觸發【熱血】天賦，威力暴擊提升 20%！`;
            }

            if (systemDatabase.weather.attr !== 'none' && student.pet.type === systemDatabase.weather.attr) {
                dmg = Math.floor(dmg * 1.5);
                text += ` ⚡ 環境天氣大共鳴！再度增幅 50%！`;
            }

            boss.currentHp -= dmg;
            student.damageContribution += dmg;
            student.hasActed = true;

            if (student.damageContribution >= 300) { student.achievements.bossHunter = true; }

            playSoundEffect('hit');
            saveDatabase();

            setTimeout(() => {
                alert(`💥 攻擊成功！造成魔王 ${dmg} 點物理重擊！\n${text}`);
                if (boss.currentHp <= 0) {
                    boss.currentHp = 0; boss.active = false;
                    playSoundEffect('victory');
                    confetti({ particleCount: 100 });
                    setTimeout(() => {
                        alert(`🎉 凝聚全班的心智！成功擊潰強敵！全體同學獲得晶石x3、代幣x1！`);
                        systemDatabase.students.forEach(st => { st.foodCount += 3; st.tokens += 1; });
                        saveDatabase();
                    }, 400);
                }
            }, 100);
        }

        function triggerQRGeneration() {
            if (qrcodesGenerated) return;
            const printArea = document.getElementById('qrPrintArea');
            if(!printArea) return;
            printArea.innerHTML = '';
            const currentBaseUrl = window.location.href.split('?')[0];

            systemDatabase.students.forEach(st => {
                printArea.innerHTML += `
                    <div class="qr-card team-bg-${st.team}">
                        <div style="font-weight:bold; font-size:12px;">${st.id}號 ${st.name}</div>
                        <div id="qr-hold-${st.id}" style="padding:4px; background:white; width:100px; height:100px; display:flex; align-items:center; justify-content:center;"></div>
                    </div>
                `;
            });
            setTimeout(() => {
                systemDatabase.students.forEach(st => {
                    const el = document.getElementById(`qr-hold-${st.id}`);
                    if (el) { 
                        new QRCode(el, { text: `${currentBaseUrl}?seat=${st.id}`, width: 90, height: 90 }); 
                    }
                });
                qrcodesGenerated = true;
            }, 100);
        }

        window.onload = function() {
            initDatabase();

            const urlParams = new URLSearchParams(window.location.search);
            const targetSeat = urlParams.get('seat');
            
            if (targetSeat) {
                const seatNum = parseInt(targetSeat);
                if (seatNum >= 1 && seatNum <= 30) {
                    isStudentMode = true;
                    document.getElementById('topNavbar').style.display = 'none';
                    document.getElementById('tabletSeatGrid').style.display = 'none';
                    document.getElementById('tabletHeaderTitle').innerHTML = `📲 9班戰寵載具 (已鎖定 ${seatNum} 號專屬帳號)`;
                    document.getElementById('tabletHeaderDesc').innerText = `已對應課堂機制，請專注培養您的專屬萌寵！`;

                    switchTab('tablet');
                    currentActiveTabletSeat = seatNum;
                }
            }
        };
    </script>
</body>
</html>
