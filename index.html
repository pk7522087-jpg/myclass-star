<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星之競技場 - 班級排位系統</title>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入 Babel 編譯器 (讓瀏覽器能看懂 React 語法) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- 引入 QR Code 產生庫 (QRCode.js) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <!-- 引入 QR Code 掃描庫 (Html5-QRCode) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  
  <!-- 模組匯入映射 -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1"
      }
    }
  </script>

  <style>
    body { background-color: #0f172a; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: rgba(30, 41, 59, 0.5); border-radius: 8px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(96, 165, 250, 0.5); border-radius: 8px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(96, 165, 250, 0.8); }

    @media print {
      body, html { background: #0f172a !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      .no-print { display: none !important; }
      .print-bg-fix { background-color: #0f172a !important; border: 1px solid #334155; }
      .print-container { page-break-inside: avoid; margin-bottom: 20px; }
      * { -webkit-print-color-adjust: exact !important; color-adjust: exact !important; }
    }
  </style>
</head>
<body class="text-slate-100 font-sans overflow-x-hidden">
  
  <!-- React 應用的掛載點 -->
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Crown, Zap, Shield, Star, Music, VolumeX, Save, User, Trophy, Flame, LayoutDashboard, Edit3, RotateCcw, Wand2, UserCircle, ImageIcon, X, Rocket, Lock, AlertCircle, CheckSquare, Archive, Target, TrendingUp, History, Download, Users, Swords, ArrowRightLeft, Gamepad2, Gift, BarChart, ThumbsUp, ThumbsDown, Upload, Dices, QrCode, Camera } from 'lucide-react';

    // --- 工具：產生音效 ---
    const playAddSfx = () => {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gainNode = ctx.createGain();
        osc.type = 'triangle'; 
        osc.frequency.setValueAtTime(800, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1600, ctx.currentTime + 0.1);
        gainNode.gain.setValueAtTime(0.15, ctx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
        osc.connect(gainNode);
        gainNode.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.1);
      } catch (e) {
        console.log("音效無法播放");
      }
    };

    const playEquipSfx = (type) => {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gainNode = ctx.createGain();
        osc.connect(gainNode);
        gainNode.connect(ctx.destination);

        if (type === 'electric' || type === 'y2k') {
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(100, ctx.currentTime);
          osc.frequency.linearRampToValueAtTime(800, ctx.currentTime + 0.1);
          osc.frequency.linearRampToValueAtTime(100, ctx.currentTime + 0.2);
          gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
          osc.start(); osc.stop(ctx.currentTime + 0.2);
        } else if (type === 'fire' || type === 'vintage') {
          osc.type = 'square';
          osc.frequency.setValueAtTime(50, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.3);
          gainNode.gain.setValueAtTime(0.2, ctx.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
          osc.start(); osc.stop(ctx.currentTime + 0.3);
        } else if (type === 'magic' || type === 'neon' || type === 'gold' || type === 'soft') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(600, ctx.currentTime);
          osc.frequency.setValueAtTime(800, ctx.currentTime + 0.1);
          osc.frequency.setValueAtTime(1200, ctx.currentTime + 0.2);
          gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
          gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
          osc.start(); osc.stop(ctx.currentTime + 0.3);
        } else {
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(400, ctx.currentTime);
          gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
          osc.start(); osc.stop(ctx.currentTime + 0.1);
        }
      } catch(e){}
    };

    const getAuraClass = (aura) => {
      if (aura === 'vintage') return "sepia-[.4] contrast-125 brightness-90 saturate-50";
      if (aura === 'y2k') return "saturate-200 contrast-125 hue-rotate-[30deg] drop-shadow-[2px_4px_6px_rgba(236,72,153,0.5)]";
      if (aura === 'soft') return "brightness-[1.15] contrast-[0.85] saturate-[1.2] drop-shadow-[0_0_15px_rgba(255,255,255,0.6)]";
      if (aura === 'electric') return "brightness-110 contrast-125 saturate-200 hue-rotate-[220deg]";
      if (aura === 'fire') return "brightness-110 contrast-125 saturate-[250%] sepia hue-rotate-[-30deg]";
      if (aura === 'shadow') return "grayscale contrast-[150%] brightness-75 drop-shadow-md";
      if (aura === 'abyss') return "invert saturate-[150%] contrast-125 hue-rotate-180";
      if (aura === 'cyber') return "brightness-125 contrast-150 saturate-[300%] hue-rotate-90";
      return "";
    };

    const TITLE_CONDITIONS = [
      { title: '【每週之星】', condition: '曾達成每週評比前三名', key: 'hasBeenTop3Weekly' },
      { title: '【名人堂】', condition: '曾登錄歷史殿堂中', key: 'hasBeenHoF' },
      { title: '【MVP】', condition: '曾經在大明星中', key: 'hasBeenS' },
      { title: '【關鍵】', condition: '曾經在關鍵戰將中', key: 'hasBeenA' },
      { title: '【職業】', condition: '曾經在職業選手中', key: 'hasBeenB' },
      { title: '【賭神】', condition: '擲骰子贏過系統', key: 'hasWonDice' },
      { title: '【努力家】', condition: '認真點數曾達 5 點', key: 'hasBeenHardworker' },
      { title: '【守護天使】', condition: 'Keep點數曾達 5 點', key: 'hasBeenAngel' },
      { title: '【天選之人】', condition: '擲骰子累計獲勝 3 次', key: 'hasWonDice3Times' },
    ];

    function StarArenaApp() {
      const [activeTab, setActiveTab] = useState('avatar'); 
      const [rankingView, setRankingView] = useState('S'); 
      const [zoomedStudent, setZoomedStudent] = useState(null); 
      const [isLoaded, setIsLoaded] = useState(false);

      // 已完整加回 10 號，座號延伸至 29 號，不跳號
      const generateInitialStudents = () => {
        const list = [];
        for (let i = 1; i <= 29; i++) {
          list.push({ 
            id: i, name: `${i}號`, nickname: '', prefixTitle: '', avatar: '', effect: '', aura: '', 
            study: 0, keep: 0, weeklyGood: 0, weeklyBad: 0, dicePlayed: false, diceWon: false,
            hasBeenTop3Weekly: false, hasBeenHoF: false, hasBeenS: false, hasBeenA: false, hasBeenB: false, hasWonDice: false,
            diceWinCount: 0, hasBeenHardworker: false, hasBeenAngel: false
          });
        }
        return list;
      };

      const [students, setStudents] = useState(generateInitialStudents());
      const [historyData, setHistoryData] = useState([]);
      const [matchData, setMatchData] = useState({ phase: 'idle', teams: [], turnIndex: 0 });
      
      const [showTradeModal, setShowTradeModal] = useState(false);
      const [tradeSelection, setTradeSelection] = useState({ team1: '', member1: '', team2: '', member2: '' });

      const [selectedId, setSelectedId] = useState(1);
      const [studyScore, setStudyScore] = useState(0);
      const [keepScore, setKeepScore] = useState(0);
      const [isBatchMode, setIsBatchMode] = useState(false);
      const [batchSelection, setBatchSelection] = useState([]);
      const [batchStudyDelta, setBatchStudyDelta] = useState('');
      const [batchKeepDelta, setBatchKeepDelta] = useState('');

      const [weeklySelectedId, setWeeklySelectedId] = useState(1);
      const [weeklyGoodScore, setWeeklyGoodScore] = useState(0);
      const [weeklyBadScore, setWeeklyBadScore] = useState(0);
      const [diceState, setDiceState] = useState(null); 
      const [evalMode, setEvalMode] = useState('normal'); 
      const [showEvalRules, setShowEvalRules] = useState(false); 

      const [avatarSelectedId, setAvatarSelectedId] = useState(1);
      const [inputNickname, setInputNickname] = useState('');
      const [avatarClassTag, setAvatarClassTag] = useState(''); 
      const [isGenerating, setIsGenerating] = useState(false);
      const [showTitleInfo, setShowTitleInfo] = useState(false);

      const [toastMsg, setToastMsg] = useState("");
      const [showResetConfirm, setShowResetConfirm] = useState(false);
      const [showSettleConfirm, setShowSettleConfirm] = useState(false); 
      const [showDraftResetConfirm, setShowDraftResetConfirm] = useState(false); 
      const [showWeeklyResetConfirm, setShowWeeklyResetConfirm] = useState(false);
      const [showWeeklyDistributeConfirm, setShowWeeklyDistributeConfirm] = useState(false); 
      const [achievementQueue, setAchievementQueue] = useState([]); 

      // 大明星不足 5 位時的防禦提示控制
      const [showSStarShortageModal, setShowSStarShortageModal] = useState(false);

      const showToast = (msg) => {
        setToastMsg(msg);
        setTimeout(() => setToastMsg(""), 3000);
      };

      const [isMusicPlaying, setIsMusicPlaying] = useState(false);
      const audioRef = useRef(null);

      // --- 本地讀取 (LocalStorage) ---
      useEffect(() => {
        try {
          const savedStudents = localStorage.getItem('starArena_students');
          if (savedStudents) setStudents(JSON.parse(savedStudents));
          
          const savedHistory = localStorage.getItem('starArena_history');
          if (savedHistory) setHistoryData(JSON.parse(savedHistory));
          
          const savedMatch = localStorage.getItem('starArena_match');
          if (savedMatch) {
            const parsed = JSON.parse(savedMatch);
            if (parsed && typeof parsed === 'object' && 'phase' in parsed) setMatchData(parsed);
            else setMatchData({ phase: 'idle', teams: [], turnIndex: 0 });
          }
        } catch(e) {
          console.error("讀取本地紀錄失敗", e);
        }
        setIsLoaded(true);
      }, []);

      const checkAchievements = (oldList, newList) => {
        let newlyUnlocked = [];
        newList.forEach(newS => {
          const oldS = oldList.find(s => s.id === newS.id);
          if (!oldS) return;
          
          TITLE_CONDITIONS.forEach(tc => {
            const oldHas = tc.key === 'hasWonDice3Times' ? ((oldS.diceWinCount || 0) >= 3) : oldS[tc.key];
            const newHas = tc.key === 'hasWonDice3Times' ? ((newS.diceWinCount || 0) >= 3) : newS[tc.key];
            if (!oldHas && newHas) newlyUnlocked.push({ studentName: newS.nickname || newS.name, title: tc.title, condition: tc.condition });
          });
        });
        
        if (newlyUnlocked.length > 0) {
          setAchievementQueue(prev => [...prev, ...newlyUnlocked]);
          playEquipSfx('gold'); 
        }
      };

      // --- 本地存檔 (LocalStorage) ---
      const saveStudentsData = (updater) => {
        setStudents(prev => {
          const newStudents = typeof updater === 'function' ? updater(prev) : updater;
          setTimeout(() => checkAchievements(prev, newStudents), 0);
          localStorage.setItem('starArena_students', JSON.stringify(newStudents));
          return newStudents;
        });
      };

      const saveHistoryData = (updater) => {
        setHistoryData(prev => {
          const newHistory = typeof updater === 'function' ? updater(prev) : updater;
          localStorage.setItem('starArena_history', JSON.stringify(newHistory));
          return newHistory;
        });
      };

      const saveMatchData = (updater) => {
        setMatchData(prev => {
          const newMatch = typeof updater === 'function' ? updater(prev) : updater;
          localStorage.setItem('starArena_match', JSON.stringify(newMatch));
          return newMatch;
        });
      };

      useEffect(() => {
        const student = students.find(s => s.id === selectedId);
        if (student) { setStudyScore(student.study); setKeepScore(student.keep); }
      }, [selectedId, students]);

      useEffect(() => {
        const student = students.find(s => s.id === weeklySelectedId);
        if (student) { setWeeklyGoodScore(student.weeklyGood || 0); setWeeklyBadScore(student.weeklyBad || 0); }
      }, [weeklySelectedId, students]);

      useEffect(() => {
        const student = students.find(s => s.id === avatarSelectedId);
        if (student) setInputNickname(student.nickname || '');
      }, [avatarSelectedId, students]);

      const toggleMusic = () => {
        if (!audioRef.current) return;
        if (isMusicPlaying) {
          audioRef.current.pause();
          setIsMusicPlaying(false);
        } else {
          audioRef.current.volume = 0.35; 
          audioRef.current.play().then(() => {
            setIsMusicPlaying(true);
          }).catch(e => {
            console.error("音樂播放失敗:", e);
            showToast("🔊 瀏覽器安全阻擋：請先在畫面空白處隨意點擊一下，再按 BGM 播放！");
            setIsMusicPlaying(false); 
          });
        }
      };

      const handleEquip = (type, value) => {
        playEquipSfx(value || 'equip');
        saveStudentsData(prev => prev.map(s => s.id === avatarSelectedId ? {...s, [type]: value} : s));
      };

      // --- 本地備份與讀取機制 ---
      const handleExportJSON = () => {
        const dataToExport = { students, historyData, matchData, exportDate: new Date().toISOString() };
        const jsonString = JSON.stringify(dataToExport, null, 2);
        const blob = new Blob([jsonString], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `星之競技場_備份檔_${new Date().toLocaleDateString('zh-TW').replace(/\//g, '')}.json`;
        document.body.appendChild(link); link.click(); document.body.removeChild(link); URL.revokeObjectURL(url);
        showToast("✅ 系統紀錄已成功匯出 (JSON)！");
      };

      const handleImportJSON = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const importedData = JSON.parse(event.target.result);
            if (importedData.students) saveStudentsData(importedData.students);
            if (importedData.historyData) saveHistoryData(importedData.historyData);
            if (importedData.matchData) saveMatchData(importedData.matchData);
            showToast("✅ 系統紀錄已成功讀取並還原！");
          } catch (err) { console.error("Import error:", err); showToast("❌ 檔案讀取失敗，請確認是否為正確的 JSON 備份檔。"); }
        };
        reader.readAsText(file); e.target.value = ''; 
      };

      // --- 補回：匯出榮譽榜 HTML 網頁函數 ---
      const handleExportFile = () => {
        showToast("⏳ 正在為您打包檔案...");
        setTimeout(() => {
          const container = document.getElementById('full-roster-export');
          if (!container) return;
          let cleanHTML = container.innerHTML.replace(/animate-in fade-in slide-in-from-bottom-4/g, '');
          cleanHTML = cleanHTML.replace(/cursor-pointer/g, '');
          cleanHTML = cleanHTML.replace(/hover:-translate-y-2/g, '');
          cleanHTML = cleanHTML.replace(/hover:scale-105/g, '');

          const htmlContent = `
            <!DOCTYPE html>
            <html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>星之競技場 - 完整榮譽榜</title><script src="https://cdn.tailwindcss.com"><${'/'}script><style>body { background-color: #0f172a; color: white; padding: 2rem; font-family: sans-serif; } @media print { body { padding: 0; background: #0f172a !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; } .no-print { display: none; } }</style></head><body class="bg-[#0f172a] text-slate-100 min-h-screen"><div class="max-w-7xl mx-auto"><div class="text-center mb-12 bg-slate-900 p-8 rounded-3xl border border-slate-700 shadow-2xl relative overflow-hidden"><div class="absolute inset-0 opacity-30 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')]"></div><h1 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 via-blue-400 to-indigo-400 mb-4 relative z-10">星之競技場 STAR ARENA</h1><h2 class="text-3xl font-bold text-slate-300 relative z-10">全班英雄榮譽榜 (完整名單與專屬名片)</h2></div><div class="space-y-12">\${cleanHTML}</div></div></body></html>
          `;
          const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a'); a.href = url;
          a.download = `星之競技場_完整榮譽榜_${new Date().toLocaleDateString('zh-TW').replace(/\//g, '')}.html`;
          document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
          showToast("✅ 檔案已成功下載！");
        }, 800);
      };

      // --- 頭像生成邏輯 (已徹底移除原座號的性別綁定設定) ---
      const handleGenerateAvatar = (e, type = 'ai') => {
        e.preventDefault();
        if (!inputNickname.trim()) return showToast("請先輸入暱稱！");
        
        // 刪除原本的 isBoy 判定，改為完全無性別綁定，透過暱稱直接引領風格
        if (type === 'fast') {
          const seedText = `avatar_fast_${inputNickname}`;
          const fastUrl = `https://api.dicebear.com/9.x/adventurer/svg?seed=${encodeURIComponent(seedText)}&keepProbability=100&backgroundColor=b6e3f4,c0aede,d1d4f9,ffd5dc,ffdfbf`;
          saveStudentsData(prev => prev.map(s => s.id === avatarSelectedId ? { ...s, nickname: inputNickname, avatar: fastUrl } : s));
          playAddSfx();
          return;
        }

        setIsGenerating(true);
        const seed = Math.floor(Math.random() * 100000);
        
        let classTagStr = '';
        if (avatarClassTag === 'athlete') classTagStr = 'basketball jersey, stadium';
        if (avatarClassTag === 'streamer') classTagStr = 'vtuber, gaming headset, neon room';
        if (avatarClassTag === 'cat') classTagStr = 'cat ears, fluffy tail';
        if (avatarClassTag === 'gaming') classTagStr = 'game controller, rgb lighting';
        if (avatarClassTag === 'music') classTagStr = 'headphones, musical notes floating';

        let promptText = '';
        const baseVibe = `concept art inspired by "${inputNickname}"`;
        
        if (type === 'kpop') {
          promptText = `gorgeous K-pop idol, ${classTagStr}, Korean street fashion, dazzling neon lights, masterpiece, ${baseVibe}`;
        } else if (type === 'hipster') {
          promptText = `Genshin Impact style anime character, ${classTagStr}, highly detailed outfit, breathtaking fantasy background, epic scenery, masterpiece, ${baseVibe}`;
        } else {
          promptText = `epic anime style, ${classTagStr}, vibrant colors, highly detailed, masterpiece, ${baseVibe}`;
        }

        const aiImageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(promptText)}?width=400&height=400&nologo=true&enhance=false&model=flux&seed=${seed}`;
        
        const timeoutId = setTimeout(() => {
          showToast("⏳ 伺服器冷卻排隊中... AI 正在精雕細琢，請再稍候幾秒鐘！");
        }, 4500);

        const img = new Image();
        img.src = aiImageUrl;
        img.onload = () => {
          clearTimeout(timeoutId);
          saveStudentsData(prev => prev.map(s => s.id === avatarSelectedId ? { ...s, nickname: inputNickname, avatar: aiImageUrl } : s));
          setIsGenerating(false);
          playAddSfx();
        };
        img.onerror = () => { 
          clearTimeout(timeoutId);
          showToast("❌ AI圖片生成失敗，請稍後再試！"); 
          setIsGenerating(false); 
        };
      };

      const handleSingleUpdate = (e) => {
        e.preventDefault();
        const newStudy = parseInt(studyScore) || 0;
        const newKeep = parseInt(keepScore) || 0;
        saveStudentsData(prev => prev.map(s => s.id === selectedId ? { 
          ...s, study: newStudy, keep: newKeep,
          hasBeenHardworker: s.hasBeenHardworker || newStudy >= 5,
          hasBeenAngel: s.hasBeenAngel || newKeep >= 5
        } : s));
        playAddSfx();
        const currentIndex = students.findIndex(s => s.id === selectedId);
        if (currentIndex !== -1 && currentIndex < students.length - 1) setSelectedId(students[currentIndex + 1].id);
        else { showToast("已經完成所有人的登錄囉！"); setActiveTab('ranking'); }
      };

      const handleBatchUpdate = (e) => {
        e.preventDefault();
        if (batchSelection.length === 0) return showToast("請至少選擇一位學生！");
        const dStudy = parseInt(batchStudyDelta) || 0;
        const dKeep = parseInt(batchKeepDelta) || 0;
        if (dStudy === 0 && dKeep === 0) return showToast("請輸入要加減的分數！");
        saveStudentsData(prev => prev.map(s => {
          if (batchSelection.includes(s.id)) {
            const newStudy = Math.max(0, s.study + dStudy);
            const newKeep = Math.max(0, s.keep + dKeep);
            return { 
              ...s, study: newStudy, keep: newKeep,
              hasBeenHardworker: s.hasBeenHardworker || newStudy >= 5,
              hasBeenAngel: s.hasBeenAngel || newKeep >= 5
            };
          }
          return s;
        }));
        setBatchSelection([]); setBatchStudyDelta(''); setBatchKeepDelta('');
        playAddSfx();
        showToast(`✅ 成功為 ${batchSelection.length} 位學生批次加分！`);
      };

      const confirmReset = () => {
        saveStudentsData(generateInitialStudents());
        saveHistoryData([]);
        saveMatchData({ phase: 'idle', teams: [], turnIndex: 0 });
        setShowResetConfirm(false);
        showToast("已完整重置為初始狀態，包含歷史紀錄與隊伍！");
      };

      const handleWeeklyUpdate = (e) => {
        e.preventDefault();
        const newGood = parseInt(weeklyGoodScore) || 0;
        const newBad = parseInt(weeklyBadScore) || 0;
        saveStudentsData(prev => prev.map(s => s.id === weeklySelectedId ? { ...s, weeklyGood: newGood, weeklyBad: newBad } : s));
        playAddSfx();
        const currentIndex = students.findIndex(s => s.id === weeklySelectedId);
        if (currentIndex !== -1 && currentIndex < students.length - 1) setWeeklySelectedId(students[currentIndex + 1].id);
        else showToast("已完成所有人的評比登錄！");
      };

      const confirmResetWeekly = () => {
        saveStudentsData(prev => prev.map(s => ({ ...s, weeklyGood: 0, weeklyBad: 0, dicePlayed: false, diceWon: false })));
        setShowWeeklyResetConfirm(false);
        showToast("每週評比紀錄已重置！");
      };

      const confirmDistributeWeekly = () => {
        saveStudentsData(prev => prev.map(student => {
          const good = student.weeklyGood || 0;
          const bad = student.weeklyBad || 0;
          const overall = good - bad;
          let getsStudy = false; let getsKeep = false;

          if (evalMode === 'normal') {
            if (bad >= 5) { getsStudy = false; getsKeep = false; } 
            else if (bad >= 3) {
              if (overall >= 10) { getsStudy = true; getsKeep = true; } else { getsStudy = true; getsKeep = false; }
            } else {
              if (overall >= 5) { getsStudy = true; getsKeep = true; }
              else if (overall >= 4) { getsStudy = true; getsKeep = false; } 
              else { getsStudy = false; getsKeep = false; }
            }
          } else { 
            if (bad >= 3) { getsStudy = false; getsKeep = false; } 
            else {
              if (overall >= 10) { getsStudy = true; getsKeep = true; }
              else if (overall >= 6) { getsStudy = true; getsKeep = false; } 
              else { getsStudy = false; getsKeep = false; }
            }
          }

          const rankObj = weeklyRanked.find(ws => ws.id === student.id);
          const isTop3 = rankObj && rankObj.weeklyRank <= 3;
          
          const newStudy = student.study + (getsStudy ? 1 : 0);
          const newKeep = student.keep + (getsKeep ? 1 : 0);

          return { 
            ...student, study: newStudy, keep: newKeep, 
            weeklyGood: 0, weeklyBad: 0, dicePlayed: false, diceWon: false,
            hasBeenTop3Weekly: student.hasBeenTop3Weekly || isTop3,
            hasBeenHardworker: student.hasBeenHardworker || newStudy >= 5,
            hasBeenAngel: student.hasBeenAngel || newKeep >= 5
          };
        }));

        setShowWeeklyDistributeConfirm(false);
        playAddSfx();
        showToast("✅ 已成功發放本週獎勵至主戰力！大明星分級已同步更新。");
      };

      const startDice = (studentId) => {
        setDiceState({ studentId, phase: 'playing', isWin: false, playerDice: 1, systemDice: 1 });
        setTimeout(() => {
          const playerDice = Math.floor(Math.random() * 6) + 1;
          let systemDice = Math.floor(Math.random() * 6) + 1;
          while (systemDice === playerDice) systemDice = Math.floor(Math.random() * 6) + 1;
          const isWin = playerDice > systemDice; 
          setDiceState({ studentId, phase: 'result', isWin, playerDice, systemDice });
          
          saveStudentsData(prev => prev.map(s => {
            if (s.id === studentId) {
              const newWinCount = (s.diceWinCount || 0) + (isWin ? 1 : 0);
              return { ...s, dicePlayed: true, diceWon: isWin, hasWonDice: s.hasWonDice || isWin, diceWinCount: newWinCount };
            }
            return s;
          }));
          playAddSfx();
        }, 2000);
      };

      const handleSettle = () => {
        const sTier = rankedStudents.filter(s => s.rankInfo.tierCode === 'S').map(s => ({
          name: s.name || '', nickname: s.nickname || '', prefixTitle: s.prefixTitle || '', avatar: s.avatar || '', 
          study: s.study || 0, keep: s.keep || 0, effect: s.effect || '', aura: s.aura || ''
        }));
        const newRecord = { id: Date.now(), date: new Date().toLocaleDateString('zh-TW'), top5: sTier };
        
        saveHistoryData(prev => [newRecord, ...prev]);
        saveMatchData({ phase: 'idle', teams: [], turnIndex: 0 });
        
        saveStudentsData(prev => prev.map(student => {
          const rankObj = rankedStudents.find(rs => rs.id === student.id);
          const tier = rankObj ? rankObj.rankInfo.tierCode : 'None';
          return {
            ...student,
            hasBeenHoF: student.hasBeenHoF || (tier === 'S'),
            hasBeenS: student.hasBeenS || (tier === 'S'),
            hasBeenA: student.hasBeenA || (tier === 'A'),
            hasBeenB: student.hasBeenB || (tier === 'B')
          };
        }));

        setShowSettleConfirm(false);
        showToast("🎉 本期結算完成！榮譽已存入歷史殿堂！戰鬥力已保留，可進行戰力匹配！");
        setActiveTab('match');
      };

      const startDraft = () => {
        const sTiers = rankedStudents.filter(s => s.rankInfo.tierCode === 'S');
        if (sTiers.length < 5) {
          setShowSStarShortageModal(true); // 使用彈窗防禦機制提示，取代傳統 alert
          return;
        }
        const initialTeams = sTiers.slice(0, 5).map((s, i) => ({ id: `team-${i+1}`, captainId: s.id, memberIds: [] }));
        saveMatchData({ phase: 'drafting', teams: initialTeams, turnIndex: 0 });
        playAddSfx();
      };

      const confirmResetDraft = () => {
        saveMatchData({ phase: 'idle', teams: [], turnIndex: 0 });
        setShowDraftResetConfirm(false);
        showToast("隊伍已重置解散！");
      };

      const handlePickStudent = (studentId) => {
        saveMatchData(prev => {
          const newTeams = [...prev.teams];
          newTeams[prev.turnIndex].memberIds.push(studentId);
          const draftedIds = newTeams.flatMap(t => [t.captainId, ...t.memberIds]);
          const undrafted = rankedStudents.filter(s => !draftedIds.includes(s.id));
          const nextTurn = (prev.turnIndex + 1) % 5;
          const nextPhase = undrafted.length === 0 ? 'completed' : 'drafting';
          if (nextPhase === 'completed') showToast("🎉 所有人員挑選完畢！隊伍已成型！");
          return { ...prev, teams: newTeams, turnIndex: nextTurn, phase: nextPhase };
        });
        playAddSfx();
      };

      const confirmResetDraftConfirm = () => {
        saveMatchData({ phase: 'idle', teams: [], turnIndex: 0 });
        setShowDraftResetConfirm(false);
        showToast("隊伍已重置解散！");
      };

      // --- 核心變數快取計算 (防止 TDZ 作用域錯誤) ---
      const rankedStudents = useMemo(() => {
        const sorted = [...students].sort((a, b) => {
          if (b.study !== a.study) return b.study - a.study;
          return b.keep - a.keep;
        });
        const maxStudy = Math.max(...students.map(s => s.study), 0);
        const maxKeep = Math.max(...students.map(s => s.keep), 0);
        let currentRank = 1; let prevStudy = -1; let prevKeep = -1;

        const ranked = sorted.map((student, index) => {
          if (student.study === prevStudy && student.keep === prevKeep) {} else { currentRank = index + 1; }
          prevStudy = student.study; prevKeep = student.keep;

          const achievements = {
            isMVP: currentRank === 1 && (student.study > 0 || student.keep > 0),
            isStudyMax: student.study === maxStudy && student.study > 0,
            isKeepMax: student.keep === maxKeep && student.keep > 0
          };

          let rankInfo = { tier: '未登榜', tierCode: 'None', color: 'bg-gray-800', border: 'border-gray-600', text: 'text-gray-400', tierLevel: 0 };
          if (currentRank <= 5) rankInfo = { tier: 'S', tierCode: 'S', color: 'bg-gradient-to-r from-yellow-300 via-yellow-500 to-orange-500', text: 'text-yellow-900', border: 'border-yellow-400 shadow-[0_0_15px_rgba(250,204,21,0.6)]', tierLevel: 4 };
          else if (currentRank <= 11) rankInfo = { tier: 'A', tierCode: 'A', color: 'bg-gradient-to-r from-blue-400 to-indigo-600', text: 'text-white', border: 'border-blue-400 shadow-[0_0_10px_rgba(96,165,250,0.5)]', tierLevel: 3 };
          else if (currentRank <= 17) rankInfo = { tier: 'B', tierCode: 'B', color: 'bg-gradient-to-r from-emerald-400 to-teal-600', text: 'text-white', border: 'border-emerald-400 shadow-[0_0_10px_rgba(52,211,153,0.3)]', tierLevel: 2 };
          else if (currentRank <= 27) rankInfo = { tier: 'C', tierCode: 'C', color: 'bg-gradient-to-r from-pink-400 to-rose-600', text: 'text-white', border: 'border-pink-400 shadow-[0_0_10px_rgba(244,114,182,0.3)]', tierLevel: 1 };

          return { ...student, rank: currentRank, rankInfo, achievements };
        });

        return ranked.map((student) => {
          let nextTierTarget = null; let nextTierName = "";
          if (student.rankInfo.tierCode === 'A') { nextTierTarget = ranked[4]; nextTierName = "大明星"; }
          else if (student.rankInfo.tierCode === 'B') { nextTierTarget = ranked[10]; nextTierName = "關鍵戰將"; }
          else if (student.rankInfo.tierCode === 'C' || student.rankInfo.tierCode === 'None') { nextTierTarget = ranked[16]; nextTierName = "職業選手"; }
          
          let progress = null;
          if (nextTierTarget && student.rankInfo.tierCode !== 'S') {
            const gapStudy = nextTierTarget.study - student.study + 1;
            progress = { targetName: nextTierName, gapStudy: Math.max(0, gapStudy), gapKeep: gapStudy <= 0 ? Math.max(0, nextTierTarget.keep - student.keep + 1) : 0 };
          }
          return { ...student, progress };
        });
      }, [students]);

      const weeklyRanked = useMemo(() => {
        const sorted = [...students].sort((a, b) => {
          const overallA = (a.weeklyGood || 0) - (a.weeklyBad || 0);
          const overallB = (b.weeklyGood || 0) - (b.weeklyBad || 0);
          if (overallA !== overallB) return overallB - overallA;
          if ((a.weeklyGood || 0) !== (b.weeklyGood || 0)) return (b.weeklyGood || 0) - (a.weeklyGood || 0);
          return a.id - b.id;
        });
        let currentRank = 1; let prevOverall = null; let prevGood = null;
        return sorted.map((s, index) => {
          const overall = (s.weeklyGood || 0) - (s.weeklyBad || 0);
          if (overall === prevOverall && (s.weeklyGood || 0) === prevGood) {} else { currentRank = index + 1; }
          prevOverall = overall; prevGood = s.weeklyGood || 0;
          return { ...s, weeklyRank: currentRank, overall };
        });
      }, [students]);

      const draftedIds = useMemo(() => matchData.teams.flatMap(t => [t.captainId, ...t.memberIds]), [matchData]);
      
      const undraftedStudents = useMemo(() => {
        return rankedStudents.filter(s => !draftedIds.includes(s.id));
      }, [rankedStudents, draftedIds]);

      const highestAvailableTier = useMemo(() => {
        const found = ['A', 'B', 'C', 'None'].find(tier => undraftedStudents.some(s => s.rankInfo.tierCode === tier));
        return found || 'S';
      }, [undraftedStudents]);

      const tradeStudent1 = rankedStudents.find(s => s.id === parseInt(tradeSelection.member1));
      const tradeStudent2 = rankedStudents.find(s => s.id === parseInt(tradeSelection.member2));
      let tradeTypeMessage = "";
      if (tradeStudent1 && tradeStudent2) {
        if (tradeStudent1.rankInfo.tierLevel === tradeStudent2.rankInfo.tierLevel) {
          tradeTypeMessage = `同階級交易 (${tradeStudent1.rankInfo.tierCode} 換 ${tradeStudent2.rankInfo.tierCode})`;

          tradeTypeMessage = `跨階級交易 (${tradeStudent1.rankInfo.tierCode} 換 ${tradeStudent2.rankInfo.tierCode}) - 需交易特例才可執行`;
        }
      }

      const executeTrade = () => {
        const { team1, member1, team2, member2 } = tradeSelection;
        if(!team1 || !member1 || !team2 || !member2) return showToast("請完整選擇要交易的兩名對象！");
        if(team1 === team2) return showToast("無法在同一隊內交易！");

        saveMatchData(prev => {
          const t1Idx = prev.teams.findIndex(t => t.id === team1);
          const t2Idx = prev.teams.findIndex(t => t.id === team2);
          const newTeams = [...prev.teams];

          newTeams[t1Idx].memberIds = newTeams[t1Idx].memberIds.map(id => id === parseInt(member1) ? parseInt(member2) : id);
          newTeams[t2Idx].memberIds = newTeams[t2Idx].memberIds.map(id => id === parseInt(member2) ? parseInt(member1) : id);
          
          return { ...prev, teams: newTeams };
        });
        
        setShowTradeModal(false);
        setTradeSelection({ team1: '', member1: '', team2: '', member2: '' });
        playAddSfx();
        showToast("🤝 交易成功！");
      };

      // --- 各階級排位繪製方法 ---
      const renderTierSection = (title, emoji, maxCount, targetTier, themeClasses, styleType) => {
        const tierStudents = rankedStudents.filter(s => s.rankInfo.tierCode === targetTier);
        const tierBackgrounds = { 'idol': 'https://image.pollinations.ai/prompt/Kpop%20idol%20concert%20stage%20neon%20lights%20anime%20style%20scenery?width=1200&height=600&nologo=true&seed=101', 'basketball': 'https://image.pollinations.ai/prompt/basketball%20stadium%20anime%20style%20epic%20lighting%20scenery?width=1200&height=600&nologo=true&seed=202', 'genshin': 'https://image.pollinations.ai/prompt/fantasy%20anime%20landscape%20epic%20scenery?width=1200&height=600&nologo=true&seed=303', 'anime': 'https://image.pollinations.ai/prompt/magical%20anime%20academy%20cherry%20blossoms%20pink%20scenery?width=1200&height=600&nologo=true&seed=404' };
        
        return (
          <div className={`mb-8 p-1 rounded-2xl bg-gradient-to-br ${themeClasses.bgGradient} shadow-xl relative overflow-hidden transition-all duration-300 animate-in fade-in slide-in-from-bottom-4 print-container`}>
            <div className="absolute inset-0 opacity-40 mix-blend-overlay z-0 no-print"><img src={tierBackgrounds[styleType]} alt="bg" className="w-full h-full object-cover" /></div>
            <div className="absolute top-0 left-0 w-full h-full opacity-30 pointer-events-none bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] mix-blend-overlay z-0"></div>
            <div className="bg-slate-900/80 backdrop-blur-md rounded-xl p-5 min-h-[400px] relative z-10 border border-white/10 print-bg-fix">
              <div className="flex justify-between items-center mb-6 border-b border-white/20 pb-4 relative">

                <span className="text-sm font-bold bg-white/10 px-4 py-2 rounded-full text-white/80 border border-white/20 shadow-inner">席次狀況: {tierStudents.length} / {maxCount}</span>

              <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6">
                {tierStudents.map((s) => {
                  const displayName = s.prefixTitle ? `${s.prefixTitle} ${s.nickname || s.name}` : (s.nickname || s.name);
                  const auraClass = getAuraClass(s.aura);
                  const displayAvatar = s.avatar ? ( <img src={s.avatar} alt="avatar" className={`w-full h-full object-cover transition-all duration-300 ${auraClass}`} /> ) : ( <User size={24} className="opacity-50 text-white" /> );

                  const renderBadges = () => (
                    <div className="absolute -top-3 -right-3 flex flex-col gap-1 z-30">
                      {s.achievements.isMVP && <div className="bg-yellow-400 p-1.5 rounded-full shadow-lg border border-yellow-200 animate-bounce" title="MVP 王者"><Crown size={14} className="text-yellow-900"/></div>}
                      {s.achievements.isStudyMax && !s.achievements.isMVP && <div className="bg-pink-500 p-1.5 rounded-full shadow-lg border border-pink-300" title="學霸之巔"><Flame size={12} className="text-white"/></div>}
                      {s.achievements.isKeepMax && !s.achievements.isMVP && <div className="bg-cyan-500 p-1.5 rounded-full shadow-lg border border-cyan-300" title="守護之盾"><Shield size={12} className="text-white"/></div>}

                          <span className="font-serif font-bold text-sm md:text-lg mb-1 text-emerald-100 tracking-widest truncate w-full text-center">{displayName}</span>
                          <div className="w-full space-y-1 bg-slate-900/80 rounded p-2 text-center border-t border-b border-amber-900/50 mt-2"><div className="text-xs font-bold text-amber-200 flex items-center justify-center gap-1"><Flame size={12} /> 認真: {s.study}</div><div className="text-xs font-bold text-emerald-300 flex items-center justify-center gap-1"><Zap size={12} /> Keep: {s.keep}</div></div>
                        </div>
                      </div>

                  } else {
                    return (
                      <div key={s.id} onClick={() => setZoomedStudent(s)} className="cursor-pointer group relative flex flex-col items-center justify-center p-4 rounded-[2rem] border-4 border-pink-300 bg-white/10 backdrop-blur-sm transform transition-all hover:scale-105 hover:bg-pink-500/20">
                        {renderBadges()}<div className="relative mb-2"><div className="w-16 h-16 rounded-full overflow-hidden border-2 border-white bg-pink-900/50 flex items-center justify-center">{displayAvatar}</div><div className={`absolute -top-1 -left-1 w-6 h-6 rounded-full flex items-center justify-center font-black text-xs bg-pink-400 text-white shadow-lg shadow-pink-500/50`}>{s.rank}</div></div>
                        <span className="font-black text-sm md:text-lg mb-1 text-pink-100 drop-shadow-md truncate w-full text-center">{displayName}</span>
                        <div className="w-full space-y-1 bg-slate-900/40 rounded-2xl p-2 text-center backdrop-blur-md mt-2"><div className="text-xs font-bold text-pink-300 flex items-center justify-center gap-1"><Flame size={12} /> 認真: {s.study}</div><div className="text-xs font-bold text-violet-300 flex items-center justify-center gap-1"><Zap size={12} /> Keep: {s.keep}</div></div>
                      </div>
                    );
                  }

                {Array.from({ length: Math.max(0, maxCount - tierStudents.length) }).map((_, i) => (
                  <div key={`empty-${i}`} className="flex flex-col items-center justify-center p-4 rounded-2xl border-2 border-dashed border-slate-600 bg-slate-800/60 backdrop-blur-sm text-slate-400 min-h-[160px]"><User size={32} className="mb-3 opacity-50" /><span className="font-bold text-sm tracking-widest">虛位以待</span></div>
                ))}
              </div>
            </div>
          </div>
        );

            <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm animate-in fade-in no-print">
              <div className="bg-slate-900 border border-red-900/50 rounded-3xl p-8 max-w-md w-full shadow-[0_0_40px_rgba(220,38,38,0.3)]">
                <div className="flex justify-center mb-4"><div className="bg-red-500/20 p-4 rounded-full"><AlertCircle size={40} className="text-red-500" /></div></div>
                <h3 className="text-2xl font-black text-center text-white mb-2">警告：重置所有資料</h3>
                <p className="text-slate-400 text-center mb-8">這將會清除全班學生的成績、暱稱、頭像，<br/><span className="text-red-400 font-bold">包含歷史殿堂的所有紀錄！</span><br/>確定要回歸最原本設定嗎？</p>
                <div className="flex gap-4">
                  <button onClick={() => setShowResetConfirm(false)} className="flex-1 py-3 rounded-xl font-bold text-slate-300 bg-slate-800 hover:bg-slate-700">取消</button>
                  <button onClick={confirmReset} className="flex-1 py-3 rounded-xl font-bold text-white bg-red-600 hover:bg-red-500">確定重置</button>
                </div>
              </div>
            </div>
          )}

          {showSettleConfirm && (
            <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm animate-in fade-in no-print">
              <div className="bg-slate-900 border border-amber-900/50 rounded-3xl p-8 max-w-md w-full shadow-[0_0_40px_rgba(245,158,11,0.2)]">
                <div className="flex justify-center mb-4"><div className="bg-amber-500/20 p-4 rounded-full"><Archive size={40} className="text-amber-500" /></div></div>
                <h3 className="text-2xl font-black text-center text-white mb-2">結算本期成績</h3>
                <p className="text-slate-400 text-center mb-6">系統將會把本期的「大明星」名單存入歷史殿堂。<br/><span className="text-emerald-400 font-bold">※ 全班分數將會保留，不會歸零。</span></p>
                <div className="flex gap-4">
                  <button onClick={() => setShowSettleConfirm(false)} className="flex-1 py-3 rounded-xl font-bold text-slate-300 bg-slate-800 hover:bg-slate-700">取消</button>
                  <button onClick={handleSettle} className="flex-1 py-3 rounded-xl font-bold text-white bg-amber-600 hover:bg-amber-500">確定結算</button>
                </div>
              </div>
            </div>
          )}

          {showDraftResetConfirm && (
            <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm animate-in fade-in no-print">
              <div className="bg-slate-900 border border-indigo-900/50 rounded-3xl p-8 max-w-md w-full shadow-[0_0_40px_rgba(99,102,241,0.2)]">
                <div className="flex justify-center mb-4"><div className="bg-indigo-500/20 p-4 rounded-full"><Users size={40} className="text-indigo-500" /></div></div>
                <h3 className="text-2xl font-black text-center text-white mb-2">重置匹配隊伍</h3>
                <p className="text-slate-400 text-center mb-6">確定要解散所有隊伍，重新進行選秀大會嗎？</p>
                <div className="flex gap-4">
                  <button onClick={() => setShowDraftResetConfirm(false)} className="flex-1 py-3 rounded-xl font-bold text-slate-300 bg-slate-800 hover:bg-slate-700">取消</button>
                  <button onClick={confirmResetDraft} className="flex-1 py-3 rounded-xl font-bold text-white bg-indigo-600 hover:bg-indigo-500">確定解散重來</button>
                </div>
              </div>
            </div>
          )}

          {diceState && (
            <div className="fixed inset-0 z-[300] flex items-center justify-center p-4 bg-slate-950/90 backdrop-blur-md animate-in fade-in no-print">
              <div className="bg-slate-900 border-2 border-indigo-500 rounded-3xl p-8 max-w-md w-full shadow-[0_0_40px_rgba(99,102,241,0.4)] text-center relative overflow-hidden flex flex-col items-center justify-center">
                <h3 className="text-2xl font-black text-indigo-300 mb-6 flex items-center justify-center gap-2"><Gamepad2/> 幸運擲骰對決</h3>
                
                {diceState.phase === 'playing' ? (
                  <div className="py-12 flex flex-col items-center">
                     <div className="flex gap-8 mb-6">
                       <div className="text-6xl animate-[spin_0.5s_linear_infinite]">🎲</div>
                       <div className="text-6xl animate-[spin_0.5s_linear_infinite_reverse]">🎲</div>
                     </div>
                     <p className="text-xl font-bold text-white animate-pulse">骰子轉動中...</p>
                     <p className="text-sm text-slate-400 mt-2">與系統比大小，贏了抽卡+1！</p>
                  </div>
                ) : (
                  <div className="py-6 animate-in zoom-in text-center flex flex-col items-center">
                    <div className="flex justify-center gap-8 mb-6">
                       <div className="flex flex-col items-center">
                         <span className="text-sm text-slate-400 font-bold mb-2">你的點數</span>
                         <div className="w-16 h-16 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center text-4xl font-black text-white shadow-lg border-2 border-indigo-300">{diceState.playerDice}</div>
                       </div>
                       <div className="flex flex-col items-center">
                         <span className="text-sm text-slate-400 font-bold mb-2">系統點數</span>
                         <div className="w-16 h-16 bg-slate-800 rounded-xl flex items-center justify-center text-4xl font-black text-slate-300 shadow-lg border-2 border-slate-600">{diceState.systemDice}</div>
                       </div>
                    </div>

                    {diceState.isWin ? (
                       <>
                         <h4 className="text-3xl font-black text-yellow-400 mb-2">大成功！</h4>
                         <p className="text-lg text-white font-bold mb-6">恭喜獲得 <span className="text-pink-400">額外 1 次</span> 抽卡機會！</p>
                       </>
                    ) : (
                       <>
                         <h4 className="text-3xl font-black text-slate-400 mb-2">殘念...</h4>
                         <p className="text-lg text-slate-300 font-bold mb-6">點數較小，不過沒有任何損失！</p>
                       </>
                    )}
                    <button onClick={() => setDiceState(null)} className="w-full max-w-[200px] py-3 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl transition-all shadow-lg active:scale-95">確認領取</button>
                  </div>
                )}
              </div>
            </div>
          )}

          {showWeeklyResetConfirm && (
            <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm animate-in fade-in no-print">
              <div className="bg-slate-900 border border-red-900/50 rounded-3xl p-8 max-w-md w-full shadow-[0_0_40px_rgba(220,38,38,0.3)]">
                <div className="flex justify-center mb-4"><div className="bg-red-500/20 p-4 rounded-full"><AlertCircle size={40} className="text-red-500" /></div></div>
                <h3 className="text-2xl font-black text-center text-white mb-2">重置每週評比</h3>
                <p className="text-slate-400 text-center mb-8">這將會清除全班的【每週評比】紀錄（好壞表現數），<br/><span className="text-red-400 font-bold">包含擲骰子的遊玩狀態也會重置！</span><br/>確定要清空嗎？</p>
                <div className="flex gap-4">
                  <button onClick={() => setShowWeeklyResetConfirm(false)} className="flex-1 py-3 rounded-xl font-bold text-slate-300 bg-slate-800 hover:bg-slate-700">取消</button>
                  <button onClick={confirmResetWeekly} className="flex-1 py-3 rounded-xl font-bold text-white bg-red-600 hover:bg-red-500">確定重置</button>
                </div>
              </div>
            </div>
          )}

          {showWeeklyDistributeConfirm && (
            <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm animate-in fade-in no-print">
              <div className="bg-slate-900 border border-fuchsia-900/50 rounded-3xl p-8 max-w-md w-full shadow-[0_0_40px_rgba(217,70,239,0.3)]">
                <div className="flex justify-center mb-4"><div className="bg-fuchsia-500/20 p-4 rounded-full"><Gift size={40} className="text-fuchsia-500" /></div></div>
                <h3 className="text-2xl font-black text-center text-white mb-2">發放獎勵並重置</h3>
                <p className="text-slate-400 text-center mb-8">系統將根據目前的評比模式，將「一級棒」與「Keep Going」<span className="text-fuchsia-400 font-bold">自動加到學生的主線戰力中</span>，並且【清空本週的評比分數】！<br/>確定要執行嗎？</p>
                <div className="flex gap-4">
                  <button onClick={() => setShowWeeklyDistributeConfirm(false)} className="flex-1 py-3 rounded-xl font-bold text-slate-300 bg-slate-800 hover:bg-slate-700">取消</button>
                  <button onClick={confirmDistributeWeekly} className="flex-1 py-3 rounded-xl font-bold text-white bg-fuchsia-600 hover:bg-fuchsia-500">確定發放</button>
                </div>
              </div>
            </div>
          )}

          {showEvalRules && (
            <div className="fixed inset-0 z-[400] flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm animate-in fade-in no-print">
              <div className="bg-slate-900 border border-fuchsia-900/50 rounded-3xl p-8 max-w-lg w-full shadow-[0_0_40px_rgba(217,70,239,0.3)] relative">
                <button className="absolute top-6 right-6 text-slate-400 hover:text-white transition-transform hover:rotate-90" onClick={() => setShowEvalRules(false)}><X size={28}/></button>
                <h3 className="text-2xl font-black text-center text-fuchsia-400 mb-8 flex items-center justify-center gap-2"><Target/> 評比結算標準說明</h3>
                
                <div className="space-y-6">
                  <div className="p-5 bg-slate-800/80 rounded-2xl border border-blue-500/30 shadow-lg">
                    <h5 className="font-black text-blue-400 mb-4 text-xl flex items-center gap-2">🟦 一般標準</h5>
                    <ul className="list-disc list-inside text-sm md:text-base text-slate-300 space-y-3">
                      <li><span className="text-rose-400 font-bold">壞表現 ≥ 5</span>：無 any 獎勵</li>
                      <li><span className="text-rose-400 font-bold">壞表現 ≥ 3</span>：整體 ≥ 10 得(一級棒+Keep)，否則僅獲(一級棒)</li>
                      <li><span className="text-emerald-400 font-bold">壞表現 &lt; 3</span>：整體 ≥ 5 得(一級棒+Keep)<br/>
                          <span className="pl-6 block mt-1">整體 ≥ 4 僅獲(一級棒)</span><br/>
                          <span className="pl-6 block mt-1 text-slate-500">3分以下無獎勵</span></li>
                    </ul>
                  </div>
                  <div className="p-5 bg-slate-800/80 rounded-2xl border border-rose-500/30 shadow-lg">
                    <h5 className="font-black text-rose-400 mb-4 text-xl flex items-center gap-2">🟥 嚴格標準</h5>
                    <ul className="list-disc list-inside text-sm md:text-base text-slate-300 space-y-3">
                      <li><span className="text-rose-400 font-bold">壞表現 ≥ 3</span>：無 any 獎勵</li>
                      <li><span className="text-emerald-400 font-bold">壞表現 &lt; 3</span>：整體 ≥ 10 得(一級棒+Keep)<br/>
                          <span className="pl-6 block mt-1">整體 ≥ 6 僅獲(一級棒)</span><br/>
                          <span className="pl-6 block mt-1 text-slate-500">5分以下無獎勵</span></li>
                    </ul>
                  </div>
                </div>
              </div>
            </div>
          )}

          {showTitleInfo && (
            <div className="fixed inset-0 z-[400] flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm animate-in fade-in no-print">
              <div className="bg-slate-900 border border-indigo-900/50 rounded-3xl p-8 max-w-2xl w-full shadow-[0_0_40px_rgba(99,102,241,0.3)] relative">
                <button className="absolute top-6 right-6 text-slate-400 hover:text-white transition-transform hover:rotate-90" onClick={() => setShowTitleInfo(false)}><X size={28}/></button>
                <h3 className="text-2xl font-black text-center text-indigo-400 mb-6 flex items-center justify-center gap-2"><Crown/> 專屬稱號圖鑑</h3>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 max-h-[60vh] overflow-y-auto custom-scrollbar pr-2">
                  {TITLE_CONDITIONS.map(tc => {
                    const student = students.find(s => s.id === avatarSelectedId);
                    const isUnlocked = student ? (tc.key === 'hasWonDice3Times' ? ((student.diceWinCount || 0) >= 3) : student[tc.key]) : false;
                    return (
                      <div key={tc.title} className={`p-4 rounded-xl border transition-all ${isUnlocked ? 'bg-indigo-900/30 border-indigo-500/50 shadow-[0_0_15px_rgba(99,102,241,0.2)]' : 'bg-slate-800/50 border-slate-700'}`}>
                        <div className={`text-lg font-black mb-1 flex items-center gap-2 ${isUnlocked ? 'text-yellow-400' : 'text-slate-500'}`}>
                          {tc.title} {isUnlocked && <Star size={16} className="text-yellow-500" />}
                        </div>
                        <div className={`text-sm ${isUnlocked ? 'text-indigo-200' : 'text-slate-600'}`}>{tc.condition} {isUnlocked && <span className="text-emerald-400 font-bold ml-1">已解鎖</span>}</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          )}

          {/* 大明星不足 5 位的精美 React 防禦彈窗 */}
          {showSStarShortageModal && (
            <div className="fixed inset-0 z-[400] flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm animate-in fade-in no-print">
              <div className="bg-slate-900 border border-amber-500/50 rounded-3xl p-8 max-w-md w-full shadow-[0_0_45px_rgba(245,158,11,0.35)] relative text-center">
                <button className="absolute top-4 right-4 text-slate-400 hover:text-white" onClick={() => setShowSStarShortageModal(false)}><X size={24}/></button>
                <div className="flex justify-center mb-4"><div className="bg-amber-500/10 p-4 rounded-full text-amber-400"><Users size={48} className="animate-pulse" /></div></div>
                <h3 className="text-2xl font-black text-amber-400 mb-2">🪐 隊長集結人數不足！</h3>
                <p className="text-sm text-slate-300 leading-relaxed mb-6">
                  選秀大會需要由當期 <span className="text-yellow-400 font-bold">排名前 5 名的大明星 (S級)</span> 擔任隊長。<br />
                  目前班級中僅有 <span className="text-pink-400 font-bold">{rankedStudents.filter(s => s.rankInfo.tierCode === 'S').length} 位</span> 學生達到大明星席位！
                </p>
                <div className="text-left p-4 bg-slate-950/50 rounded-2xl border border-slate-800 text-xs text-slate-400 space-y-2 mb-6">
                  <p className="font-bold text-slate-300">💡 老師可以透過以下方式開啟匹配：</p>
                  <p>1. 至「登錄戰力」或「每週評比」，為至少 5 位學生加上分數。</p>
                  <p>2. 單人只要一級棒大於 0 點、或 Keep 大於 0 點，即可自動進入排位分級！</p>
                </div>
                <button onClick={() => setShowSStarShortageModal(false)} className="w-full py-3 bg-gradient-to-r from-amber-500 to-yellow-500 hover:from-amber-400 hover:to-yellow-400 text-slate-950 font-black rounded-xl transition-all shadow-lg active:scale-95">
                  好，我去幫學生加分！
                </button>
              </div>
            </div>
          )}

          {/* 隱藏的快照匯出全班區域 */}
          <div id="full-roster-export" className="hidden">
            {renderTierSection('大明星', '🎵🎤', 5, 'S', { bgGradient: 'from-yellow-600 via-orange-500 to-red-600', textColor: 'text-yellow-300 drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]' }, 'idol')}
            <div className="h-8"></div>
            {renderTierSection('關鍵戰將', '🏀⛹️‍♂️', 6, 'A', { bgGradient: 'from-blue-700 via-cyan-600 to-indigo-800', textColor: 'text-cyan-200 drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]' }, 'basketball')}
            <div className="h-8"></div>
            {renderTierSection('職業選手', '⚔️✨', 6, 'B', { bgGradient: 'from-emerald-700 via-green-600 to-teal-900', textColor: 'text-emerald-200 drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]' }, 'genshin')}
            <div className="h-8"></div>
            {renderTierSection('發展新秀', '🌸🪄', 10, 'C', { bgGradient: 'from-purple-700 via-pink-600 to-rose-900', textColor: 'text-pink-200 drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]' }, 'anime')}
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<StarArenaApp />);
  </script>
</body>
</html>
